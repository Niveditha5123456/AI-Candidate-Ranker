<!DOCTYPE html>
<html>
<head>

<title>Candidate Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background-image: url('https://i.postimg.cc/YCgH4J9T/Whats-App-Image-2026-06-24-at-12-28-39-AM.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    min-height:100vh;
}

.container{
    background:transparent;
    backdrop-filter:blur(12px);
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.profile-card{
    background:linear-gradient(135deg,rgba(15,23,42,0.97),rgba(30,64,175,0.97));
    color:white;
    border-radius:20px;
    padding:25px;
    margin-top:20px;
    box-shadow:
        0 0 15px rgba(59,130,246,.5),
        0 0 35px rgba(59,130,246,.3);
    border:1px solid rgba(255,255,255,0.15);
}

h1{
    color:#38bdf8;
    font-size:42px;
    margin-bottom:15px;
}

.headline{
    font-size:22px;
    color:#d1d5db;
    margin-bottom:10px;
}

.location{
    color:#9ca3af;
    margin-bottom:10px;
}

.experience{
    color:#22c55e;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.section{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    color:white;
    border-radius:20px;
    padding:25px;
    margin-top:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.section h2{
    color: white;
    margin-bottom:20px;
    font-size:24px;
}

.summary{
    line-height:1.8;
    color:#d1d5db;
    background:linear-gradient(135deg,#0f172a,#1e40af);
    padding:20px;
}

#skills{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    list-style:none;
}

.skill{
    background:#1e293b;
    border:1px solid #38bdf8;
    color:#38bdf8;
    padding:10px 18px;
    border-radius:30px;
    font-size:14px;
    font-weight:600;
}

.timeline-item{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
    border-left:4px solid #38bdf8;
}

.timeline-item h3{
    color:white;
}

.timeline-item p{
    color:white;
}

.score-box{
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    padding:25px;
    border-radius:20px;
    text-align:center;
    margin-top:25px;
}

.score-box h2{
    color:white;
    margin-bottom:10px;
}

.score{
    font-size:48px;
    font-weight:bold;
    color:white;
}

.back-btn{
    position:fixed;
    right: 20px;
    bottom: 15px;
    z-index: 1000;
}

.nav-links,.back-btn{
    color: white;
    text-decoration: none;
    background: #0ea5e9;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    box-shadow: 0 0 8px rgba(37,99,235,0.3);
    border: 1px solid rgba(255,255,255,0.15);
}

.back-btn:hover{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    box-shadow: 0 0 12px rgba(59,130,246,0.50);
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.info-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    padding:18px;
    border-radius:12px;
}

.info-card h4{
    color:#38bdf8;
}

.info-card p{
    color:white;
}
h2{
    margin-top:40px;
    color:#00c6ff;
}

#summary{
    background:linear-gradient(135deg,#0f172a,#2563eb);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px rgba(37,99,235,0.25);
    line-height:1.8;
    color: white;
}

.timeline-card,
.edu-card,
.signal-card{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    border:none;
    border-radius:15px;
    padding:20px;
    margin-top:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.timeline-card h3,
.edu-card h3{
    color:white;
}

.profile-card p,
.timeline-card p,
.edu-card p,
.signal-card p,
.signal-card span,
.signal-card div,
.summary,
#summary,
.location,
.headline{
    color:white;
}

.signal-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
}
.score-box{
    margin:20px 0;
    padding:20px;
    border-radius:15px;
    background:linear-gradient(135deg,#0f172a,#1e40af);
    text-align:center;
}

.score-box h3{
    color:#cbd5e1;
    margin-bottom:10px;
}

.score-box h1{
    color:#22c55e;
    font-size:42px;
    margin:0;
}
.nav-links{
    position: fixed;
    right: 250px;
    bottom: 15px;
    z-index: 1000;
    gap: 3px;
}


.nav-links:hover{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    box-shadow: 0 0 12px rgba(59,130,246,0.5);
}
.nav-links{
    right: 320px;
    bottom: 5px;
}
.back-btn{
    right: 20px;
    bottom: 5px;
}


</style>
</head>

<body>

<div class="container">

        <a href="dashboard.html" class="back-btn">
            ← Back to Dashboard
        </a>
        <a href="index.html" class="nav-links">
            Home
        </a>


    <div class="profile-card">
        <h1 id="name"></h1>
        <p class="headline" id="title"></p>
        <p class="location" id="location"></p>
        <p class="experience" id="experience"></p>
    </div>

    <div class="score-box">
        <h3>AI Match Score</h3>
        <h1 id="matchScore">--%</h1>
    </div>

    <h2>Profile Summary</h2>
    <p id="summary"></p>

    <h2>Career History Timeline</h2>
    <div id="careerHistory"></div>

    <h2>Education</h2>
    <div id="education"></div>

    <h2>Redrob Signals</h2>
    <div id="signals"></div>



</div>

<div class="profile-card">

<h1 id="name"></h1>

<p id="title"></p>

<p id="location"></p>

<p id="experience"></p>

<h3>Skills</h3>

<ul id="skills"></ul>

</div>

<script>

const selectedId = localStorage.getItem("candidateId");

fetch("http://127.0.0.1:5000/candidates")
.then(response => response.json())
.then(data => {
    let candidate = null;

    if (selectedId) {
        candidate = data.find(c => c.candidate_id === selectedId);
    }

    if (!candidate) {
        const jd = localStorage.getItem("jobDescription")?.trim().toLowerCase() || "";
        candidate = data.find(c => {
            const title = c.profile.current_title?.toLowerCase() || "";
            const headline = c.profile.headline?.toLowerCase() || "";
            const summary = c.profile.summary?.toLowerCase() || "";
            return title.includes(jd) || headline.includes(jd) || summary.includes(jd);
        });
    }

    if (!candidate) {
        document.body.innerHTML = "<div style='padding:40px; font-family:Arial, sans-serif; text-align:center; color:#111;'>No candidate found. Please search again from the recruiter page.</div>";
        return;
    }

    document.getElementById("name").innerText = candidate.profile.anonymized_name;
    document.getElementById("title").innerText = candidate.profile.current_title;
    document.getElementById("location").innerText = candidate.profile.location;
    document.getElementById("experience").innerText = candidate.profile.years_of_experience + " years experience";

    let skills = document.getElementById("skills");
    skills.innerHTML = "";
    candidate.skills.forEach(skill => {
        skills.innerHTML += `
            <li>
                <b>${skill.name}</b>
                (${skill.proficiency})
                • ${skill.endorsements} endorsements
            </li>
        `;
    });

    document.getElementById("summary").innerText = candidate.profile.summary || "No summary available";

    let careerDiv = document.getElementById("careerHistory");
    careerDiv.innerHTML = "";
    candidate.career_history.forEach(job => {
        careerDiv.innerHTML += `
        <div class="timeline-card">
            <h3>${job.title}</h3>
            <p><strong>${job.company}</strong></p>
            <p>${job.start_date} - ${job.end_date || "Present"}</p>
            <p>${job.description}</p>
        </div>
        `;
    });

    let eduDiv = document.getElementById("education");
    eduDiv.innerHTML = "";
    if (candidate.education) {
        candidate.education.forEach(edu => {
            eduDiv.innerHTML += `
            <div class="edu-card">
                <h3>${edu.degree}</h3>
                <p>${edu.institution}</p>
            </div>
            `;
        });
    }

    let signalDiv = document.getElementById("signals");
    signalDiv.innerHTML = "";
    if (candidate.redrob_signals) {
        for (let key in candidate.redrob_signals) {
            signalDiv.innerHTML += `
            <div class="signal-card">
                <strong>${key}</strong> : ${candidate.redrob_signals[key]}
            </div>
            `;
        }
    }

    let score = 0;
    const jd = localStorage.getItem("jobDescription")?.toLowerCase() || "";
    const candidateText = JSON.stringify(candidate).toLowerCase();

        if(jd.includes("python") &&
           candidateText.includes("python"))
            score += 20;

        if(jd.includes("backend") &&
           candidateText.includes("backend"))
            score += 20;

        if(jd.includes("aws") &&
           candidateText.includes("aws"))
            score += 20;

        if(jd.includes("Flask") &&
           candidateText.includes("Flask"))
            score += 20;

        if(jd.includes("Engineer") &&
           candidateText.includes("Engineer"))
            score += 20;

        if(jd.includes("Frontend") &&
           candidateText.includes("Frontend"))
            score += 20;

        if(jd.includes("Full Stack") &&
           candidateText.includes("Full Stack"))
            score += 20;

        if(jd.includes("Analyst") &&
           candidateText.includes("Analyst"))
            score += 20;

        if(jd.includes("Manager") &&
           candidateText.includes("Manager"))
            score += 20;

        if(jd.includes("Engineer") &&
           candidateText.includes("Engineer"))
            score += 20;

        if(jd.includes("Graphic Designer") &&
           candidateText.includes("Graphic Designer"))
            score += 20;

        if(jd.includes("Accountant") &&
           candidateText.includes("Accountant"))
            score += 20;

        if(jd.includes("DevOps") &&
           candidateText.includes("DevOps"))
            score += 20;

        if(jd.includes("HR") &&
           candidateText.includes("HR"))
            score += 20;

        if(jd.includes("Project Manager") &&
           candidateText.includes("Project Manager"))
            score += 20;

        if(jd.includes("Java") &&
           candidateText.includes("Java"))
            score += 20;

        if(jd.includes("Marketing Manager") &&
           candidateText.includes("Marketing Manager"))
            score += 20;

        if(jd.includes("Cloud") &&
           candidateText.includes("Cloud"))
            score += 20;

        if(jd.includes("Operations Manager") &&
           candidateText.includes("Operations Manager"))
            score += 20;

        if(jd.includes("engineer") &&
           candidateText.includes("engineer"))
            score += 20;

        

        document.getElementById("matchScore")
        .innerText = score + "%";

    }
);

   
</script>

</body>
</html>
